name: Daily DMARC Check

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dnspython

      - name: Run DMARC check
        run: python scripts/check_dmarc.py

      - name: Show generated files (debug)
        run: ls -R public || true

      - name: Commit updated output
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add public/non_dmarc.json

          git diff --cached --quiet || git commit -m "Update DMARC status"

          git push
